services:
  cache:
    image: nginx:alpine
    container_name: testrange-cache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-init/10-gen-certs.sh:/docker-entrypoint.d/10-gen-certs.sh:ro
      - ./certs:/etc/nginx/certs
      - ./storage:/srv/cache
