worker_processes auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile           on;
    tcp_nopush         on;
    server_tokens      off;
    keepalive_timeout  65;

    # qcow2 / vma blobs are large.  16 GiB upper bound is generous
    # for VM snapshots; bump if a single artifact exceeds it.
    client_max_body_size       16G;
    client_body_temp_path      /var/cache/nginx/upload;
    client_body_buffer_size    512k;

    # 1. Plain HTTP -> HTTPS redirect.
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        return 301  https://$host$request_uri;
    }

    # 2. The cache itself.  Path under the URL maps 1:1 to a file
    #    under /srv/cache.  GET reads, PUT writes, DELETE removes.
    server {
        listen              443 ssl default_server;
        listen              [::]:443 ssl default_server;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root                /srv/cache;

        location / {
            # WebDAV verbs supplied by the built-in ngx_http_dav_module.
            # PUT writes the request body to the URL's path; DELETE
            # removes it.  GET is plain static-file serving.
            dav_methods           PUT DELETE;
            dav_access            user:rw group:rw all:r;
            create_full_put_path  on;
            autoindex             off;

            # Reject everything that isn't one of these three verbs so
            # callers get a clear 405 instead of nginx silently 404ing
            # a half-supported method.
            limit_except GET PUT DELETE { deny all; }
        }
    }
}
