services:
  cache-init:
    image: alpine
    command: chown -R 101:101 /srv/cache
    volumes:
      - ./storage:/srv/cache
  cache:
    depends_on:
      cache-init:
        condition: service_completed_successfully
    image: nginx:alpine
    container_name: testrange-cache
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs
      - ./storage:/srv/cache
